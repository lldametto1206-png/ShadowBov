<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ShadowBov Teste</title>
</head>

<body>

<h1>Teste ShadowBov</h1>

<input id="campo" placeholder="Digite algo">
<br><br>
<button onclick="salvar()">Salvar</button>

<div id="saida"></div>

<script>
function salvar(){
  let valor = document.getElementById("campo").value;
  localStorage.setItem("teste", valor);
  document.getElementById("saida").innerHTML =
    "Salvo: " + localStorage.getItem("teste");
}
</script>

</body>
</html>
